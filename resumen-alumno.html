<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resumen — Training Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f7f4ef;color:#1a1714;min-height:100vh;padding:32px 20px}
.container{max-width:780px;margin:0 auto}

.page-header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.brand-dot{width:28px;height:28px;background:#c8a45a;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-dot svg{width:15px;height:15px}
.page-title{font-size:20px;font-weight:800;letter-spacing:-.4px}
.page-sub{font-size:13px;color:#8a8278;margin-top:2px}
.back-link{margin-left:auto;font-size:12px;color:#c8a45a;font-weight:600;text-decoration:none;white-space:nowrap}

.info-bar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e8e4de;border-radius:12px;padding:14px 18px;margin-bottom:20px}
.info-avatar{width:36px;height:36px;border-radius:50%;background:#c8a45a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.info-name{font-size:15px;font-weight:700;color:#1a1714}
.info-meta{font-size:12px;color:#8a8278;margin-top:2px}

.card{background:#fff;border:1px solid #e8e4de;border-radius:14px;padding:24px;margin-bottom:20px}
.card-title{font-size:15px;font-weight:700;color:#1a1714;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-title-icon{font-size:18px}

.resumen-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.stat-box{background:#faf8f5;border:1px solid #f0ede8;border-radius:10px;padding:16px}
.stat-box .stat-label{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#8a8278;margin-bottom:6px}
.stat-box .stat-value{font-size:22px;font-weight:800;color:#1a1714}
.stat-box .stat-sub{font-size:11px;color:#a39b8f;margin-top:2px}

.chart-wrap{background:#faf8f5;border:1px solid #f0ede8;border-radius:10px;padding:18px;margin-bottom:14px}
.chart-wrap-title{font-size:12px;font-weight:700;color:#5a5249;margin-bottom:12px;text-transform:uppercase;letter-spacing:.3px}
.chart-canvas-box{position:relative;height:260px}

.resumen-filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.resumen-filters select{padding:8px 12px;border:1.5px solid #e8e4de;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;outline:none;color:#1a1714}

.gm-table{width:100%;border-collapse:collapse;font-size:13px}
.gm-table th{text-align:left;color:#8a8278;font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.3px;padding:8px 10px;border-bottom:1.5px solid #e8e4de}
.gm-table td{padding:10px;border-bottom:1px solid #f0ede8;color:#1a1714}
.gm-table tr:last-child td{border-bottom:none}

.resumen-empty{color:#a39b8f;font-size:14px;text-align:center;padding:40px 20px}

.mini-chart-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.mini-chart-box{background:#faf8f5;border:1px solid #f0ede8;border-radius:10px;padding:14px}
.mini-chart-title{font-size:11px;font-weight:700;color:#5a5249;margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px;text-align:center}
.mini-chart-canvas-box{position:relative;height:150px}
@media (max-width:680px){.mini-chart-grid{grid-template-columns:1fr}}
.skeleton{background:linear-gradient(90deg,#f0ede8 25%,#e8e4de 50%,#f0ede8 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <div class="brand-dot">
      <svg viewBox="0 0 14 14" fill="none">
        <rect x="1" y="1" width="4.5" height="12" rx="1.2" fill="#111"/>
        <rect x="8" y="1" width="4.5" height="7" rx="1.2" fill="#111"/>
      </svg>
    </div>
    <div>
      <div class="page-title">Resumen y progreso</div>
      <div class="page-sub" id="page-sub">Cargando...</div>
    </div>
    <a href="training-cards.html" class="back-link">← Volver a Cards</a>
  </div>

  <div class="info-bar" id="info-bar">
    <div class="skeleton" style="width:36px;height:36px;border-radius:50%"></div>
    <div style="flex:1">
      <div class="skeleton" style="width:120px;height:14px;margin-bottom:6px"></div>
      <div class="skeleton" style="width:80px;height:10px"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="card-title-icon">📊</span> Resumen trimestral</div>
    <div class="resumen-filters">
      <select id="resumen-grupo-filter" onchange="renderResumenCharts()">
        <option value="">Todos los grupos musculares</option>
      </select>
    </div>
    <div id="resumen-content">
      <div class="resumen-empty">Cargando datos de progreso...</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="card-title-icon">📈</span> Progresión por ejercicio</div>
    <div class="resumen-filters">
      <select id="ejercicio-filter" onchange="renderEjercicioCharts()">
        <option value="">Elegí un ejercicio...</option>
      </select>
    </div>
    <div id="ejercicio-content">
      <div class="resumen-empty">Elegí un ejercicio arriba para ver su progresión semana a semana.</div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://dclljrcwaddwbepfrgkv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjbGxqcmN3YWRkd2JlcGZyZ2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyODM5MzYsImV4cCI6MjA5NTg1OTkzNn0.L5KOnUELiXUBHao8IdKVLciTrs2fwIS1a6Uqq6WCWP0';

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json'
};

const params   = new URLSearchParams(window.location.search);
const alumnoId = params.get('alumno_id');

let alumnoData = null;
let resumenEjercicios = [];
let resumenCharts = {};

const CHART_COLORS = ['#c8a45a','#7a9e7e','#b3654a','#6b8cae','#a36b9e','#c2944a','#5e9e9e','#9e7a5e','#8a8e6b','#b35e8c'];

async function init() {
  if (!alumnoId) {
    showError('Falta el alumno. Accedé desde la card del alumno en Training Cards.');
    return;
  }
  await loadAlumno();
  renderInfoBar();
  await loadResumenData();
}

async function loadAlumno() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/alumnos?id=eq.${alumnoId}&select=nombre,objetivo`, { headers });
  const data = await res.json();
  alumnoData = data[0] || null;
}

function renderInfoBar() {
  if (!alumnoData) return;
  const initials = (alumnoData.nombre||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('page-sub').textContent = alumnoData.nombre;
  document.getElementById('info-bar').innerHTML = `
    <div class="info-avatar">${initials}</div>
    <div>
      <div class="info-name">${alumnoData.nombre}</div>
      <div class="info-meta">${alumnoData.objetivo || ''}</div>
    </div>
  `;
}

function showError(msg) {
  document.querySelector('.container').innerHTML = `
    <div style="text-align:center;padding:80px 20px;color:#8a8278">
      <div style="font-size:48px;margin-bottom:16px">⚠️</div>
      <div style="font-size:16px;font-weight:700;color:#1a1714;margin-bottom:8px">Error</div>
      <div style="font-size:13px;margin-bottom:24px">${msg}</div>
      <a href="training-cards.html" style="color:#c8a45a;font-weight:600;font-size:13px">← Volver a Cards</a>
    </div>`;
}

async function loadResumenData() {
  const content = document.getElementById('resumen-content');
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/ejercicios?alumno_id=eq.${alumnoId}&select=grupo_muscular,ejercicio,series,reps,carga,sesiones(semana,dia,mes,fecha)`,
      { headers }
    );
    if (!res.ok) throw new Error(await res.text());
    resumenEjercicios = await res.json();
    resumenEjercicios.sort((a,b) => {
      const sa = a.sesiones?.semana ?? 0, sb = b.sesiones?.semana ?? 0;
      if (sa !== sb) return sa - sb;
      return (a.sesiones?.dia ?? 0) - (b.sesiones?.dia ?? 0);
    });

    if (!resumenEjercicios.length) {
      content.innerHTML = '<div class="resumen-empty">Todavía no hay ejercicios cargados para este alumno.</div>';
      return;
    }

    const grupos = [...new Set(resumenEjercicios.map(e => e.grupo_muscular).filter(Boolean))].sort();
    const filterEl = document.getElementById('resumen-grupo-filter');
    filterEl.innerHTML = '<option value="">Todos los grupos musculares</option>' +
      grupos.map(g => `<option value="${g}">${g}</option>`).join('');

    const ejerciciosUnicos = [...new Set(resumenEjercicios.map(e => e.ejercicio).filter(Boolean))].sort();
    const ejFilterEl = document.getElementById('ejercicio-filter');
    ejFilterEl.innerHTML = '<option value="">Elegí un ejercicio...</option>' +
      ejerciciosUnicos.map(e => `<option value="${e}">${e}</option>`).join('');

    renderResumenCharts();
  } catch(e) {
    content.innerHTML = `<div class="resumen-empty">Error al cargar el resumen: ${e.message}</div>`;
  }
}

function calcVolumen(ex) {
  const s = Number(ex.series) || 0;
  const r = Number(ex.reps) || 0;
  const k = Number(ex.carga) || 0;
  return s * r * k;
}

function renderResumenCharts() {
  const grupoFiltro = document.getElementById('resumen-grupo-filter').value;
  const datos = grupoFiltro
    ? resumenEjercicios.filter(e => e.grupo_muscular === grupoFiltro)
    : resumenEjercicios;

  const content = document.getElementById('resumen-content');

  if (!datos.length) {
    content.innerHTML = '<div class="resumen-empty">Sin datos para este filtro.</div>';
    return;
  }

  Object.values(resumenCharts).forEach(c => c.destroy());
  resumenCharts = {};

  const porSemana = {};
  datos.forEach(ex => {
    const sem = ex.sesiones?.semana;
    if (sem === undefined || sem === null) return;
    if (!porSemana[sem]) porSemana[sem] = { volumen: 0, series: 0 };
    porSemana[sem].volumen += calcVolumen(ex);
    porSemana[sem].series  += Number(ex.series) || 0;
  });
  const semanas = Object.keys(porSemana).map(Number).sort((a,b)=>a-b);

  const gruposUnicos = [...new Set(resumenEjercicios.map(e => e.grupo_muscular).filter(Boolean))].sort();
  const porGrupoSemana = {};
  if (!grupoFiltro) {
    resumenEjercicios.forEach(ex => {
      const sem = ex.sesiones?.semana;
      const g = ex.grupo_muscular || 'Sin grupo';
      if (sem === undefined || sem === null) return;
      if (!porGrupoSemana[g]) porGrupoSemana[g] = {};
      porGrupoSemana[g][sem] = (porGrupoSemana[g][sem] || 0) + calcVolumen(ex);
    });
  }

  const volumenTotal = datos.reduce((acc, ex) => acc + calcVolumen(ex), 0);
  const seriesTotales = datos.reduce((acc, ex) => acc + (Number(ex.series)||0), 0);
  const semanasConDatos = semanas.length;
  const volumenPromedioSemanal = semanasConDatos ? Math.round(volumenTotal / semanasConDatos) : 0;

  const porMes = {};
  datos.forEach(ex => {
    let mes = ex.sesiones?.mes;
    if (mes === undefined || mes === null) {
      const sem = ex.sesiones?.semana;
      mes = sem ? Math.ceil(sem / 4) : 1;
    }
    porMes[mes] = (porMes[mes] || 0) + calcVolumen(ex);
  });
  const mesesOrdenados = Object.keys(porMes).map(Number).sort((a,b)=>a-b);
  const ultimoMes = mesesOrdenados[mesesOrdenados.length - 1];
  const penultimoMes = mesesOrdenados[mesesOrdenados.length - 2];
  let tendenciaTxt = '';
  if (ultimoMes !== undefined && penultimoMes !== undefined && porMes[penultimoMes] > 0) {
    const delta = ((porMes[ultimoMes] - porMes[penultimoMes]) / porMes[penultimoMes]) * 100;
    tendenciaTxt = `${delta >= 0 ? '+' : ''}${delta.toFixed(0)}% vs mes anterior`;
  }

  content.innerHTML = `
    <div class="resumen-stats">
      <div class="stat-box">
        <div class="stat-label">Volumen total</div>
        <div class="stat-value">${formatNum(volumenTotal)} kg</div>
        <div class="stat-sub">${tendenciaTxt || '&nbsp;'}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Series totales</div>
        <div class="stat-value">${formatNum(seriesTotales)}</div>
        <div class="stat-sub">en ${semanasConDatos} semana${semanasConDatos===1?'':'s'}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Promedio semanal</div>
        <div class="stat-value">${formatNum(volumenPromedioSemanal)} kg</div>
        <div class="stat-sub">por semana</div>
      </div>
    </div>

    <div class="chart-wrap">
      <div class="chart-wrap-title">Volumen total por semana ${grupoFiltro ? '— ' + grupoFiltro : ''}</div>
      <div class="chart-canvas-box"><canvas id="chart-volumen-semanal"></canvas></div>
    </div>

    ${!grupoFiltro ? `
    <div class="chart-wrap">
      <div class="chart-wrap-title">Volumen por grupo muscular en el tiempo</div>
      <div class="chart-canvas-box"><canvas id="chart-volumen-grupos"></canvas></div>
    </div>

    <div class="chart-wrap">
      <div class="chart-wrap-title">Volumen acumulado por grupo muscular</div>
      <table class="gm-table">
        <thead><tr><th>Grupo muscular</th><th>Volumen total</th><th>% del total</th></tr></thead>
        <tbody>
          ${gruposUnicos.map(g => {
            const vol = resumenEjercicios.filter(e => e.grupo_muscular === g).reduce((acc,ex)=>acc+calcVolumen(ex),0);
            const pct = volumenTotal ? ((vol/volumenTotal)*100).toFixed(1) : '0.0';
            return `<tr><td>${g}</td><td>${formatNum(vol)} kg</td><td>${pct}%</td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : ''}
  `;

  const ctxSem = document.getElementById('chart-volumen-semanal').getContext('2d');
  resumenCharts.semanal = new Chart(ctxSem, {
    type: 'line',
    data: {
      labels: semanas.map(s => `Sem ${s}`),
      datasets: [{
        label: 'Volumen (kg)',
        data: semanas.map(s => porSemana[s].volumen),
        borderColor: '#c8a45a',
        backgroundColor: 'rgba(200,164,90,0.12)',
        borderWidth: 2.5,
        pointRadius: 3,
        pointBackgroundColor: '#c8a45a',
        tension: 0.3,
        fill: true
      }]
    },
    options: chartBaseOptions()
  });

  if (!grupoFiltro) {
    const ctxGrupos = document.getElementById('chart-volumen-grupos').getContext('2d');
    resumenCharts.grupos = new Chart(ctxGrupos, {
      type: 'line',
      data: {
        labels: semanas.map(s => `Sem ${s}`),
        datasets: gruposUnicos.map((g, i) => ({
          label: g,
          data: semanas.map(s => (porGrupoSemana[g] && porGrupoSemana[g][s]) || 0),
          borderColor: CHART_COLORS[i % CHART_COLORS.length],
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 2.5,
          pointBackgroundColor: CHART_COLORS[i % CHART_COLORS.length],
          tension: 0.3
        }))
      },
      options: { ...chartBaseOptions(), plugins: { ...chartBaseOptions().plugins, legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 10 }, color: '#5a5249' } } } }
    });
  }
}

function chartBaseOptions() {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1714',
        titleFont: { size: 11, family: 'Inter' },
        bodyFont: { size: 11, family: 'Inter' },
        padding: 10,
        cornerRadius: 8
      }
    },
    scales: {
      x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#a39b8f' } },
      y: { grid: { color: '#f0ede8' }, ticks: { font: { size: 10 }, color: '#a39b8f' }, beginAtZero: true }
    }
  };
}

function formatNum(n) {
  return Math.round(n).toLocaleString('es-AR');
}

// ── PROGRESIÓN POR EJERCICIO ─────────────────────────────────────────
let ejercicioCharts = {};

function renderEjercicioCharts() {
  const nombreEj = document.getElementById('ejercicio-filter').value;
  const content = document.getElementById('ejercicio-content');

  Object.values(ejercicioCharts).forEach(c => c.destroy());
  ejercicioCharts = {};

  if (!nombreEj) {
    content.innerHTML = '<div class="resumen-empty">Elegí un ejercicio arriba para ver su progresión semana a semana.</div>';
    return;
  }

  const registros = resumenEjercicios.filter(e => e.ejercicio === nombreEj);

  // Agrupar por semana: si hay más de un registro en la misma semana, promediamos
  const porSemana = {}; // {semana: {series:[], reps:[], carga:[]}}
  registros.forEach(ex => {
    const sem = ex.sesiones?.semana;
    if (sem === undefined || sem === null) return;
    if (!porSemana[sem]) porSemana[sem] = { series: [], reps: [], carga: [] };
    porSemana[sem].series.push(Number(ex.series) || 0);
    porSemana[sem].reps.push(Number(ex.reps) || 0);
    porSemana[sem].carga.push(Number(ex.carga) || 0);
  });

  const semanas = Object.keys(porSemana).map(Number).sort((a,b)=>a-b);
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0) / arr.length : 0;

  if (!semanas.length) {
    content.innerHTML = '<div class="resumen-empty">Sin datos suficientes para este ejercicio.</div>';
    return;
  }

  content.innerHTML = `
    <div class="mini-chart-grid">
      <div class="mini-chart-box">
        <div class="mini-chart-title">Series por semana</div>
        <div class="mini-chart-canvas-box"><canvas id="chart-ej-series"></canvas></div>
      </div>
      <div class="mini-chart-box">
        <div class="mini-chart-title">Reps por semana</div>
        <div class="mini-chart-canvas-box"><canvas id="chart-ej-reps"></canvas></div>
      </div>
      <div class="mini-chart-box">
        <div class="mini-chart-title">Carga (kg) por semana</div>
        <div class="mini-chart-canvas-box"><canvas id="chart-ej-carga"></canvas></div>
      </div>
    </div>
  `;

  const labels = semanas.map(s => `S${s}`);
  const miniOptions = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { backgroundColor: '#1a1714', padding: 8, cornerRadius: 6, titleFont:{size:10}, bodyFont:{size:10} }
    },
    scales: {
      x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#a39b8f' } },
      y: { grid: { color: '#f0ede8' }, ticks: { font: { size: 9 }, color: '#a39b8f' }, beginAtZero: true }
    }
  };

  ejercicioCharts.series = new Chart(document.getElementById('chart-ej-series').getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [{ data: semanas.map(s => avg(porSemana[s].series)), borderColor: '#c8a45a', backgroundColor: 'rgba(200,164,90,0.12)', borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#c8a45a', tension: 0.3, fill: true }] },
    options: miniOptions
  });
  ejercicioCharts.reps = new Chart(document.getElementById('chart-ej-reps').getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [{ data: semanas.map(s => avg(porSemana[s].reps)), borderColor: '#7a9e7e', backgroundColor: 'rgba(122,158,126,0.12)', borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#7a9e7e', tension: 0.3, fill: true }] },
    options: miniOptions
  });
  ejercicioCharts.carga = new Chart(document.getElementById('chart-ej-carga').getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [{ data: semanas.map(s => avg(porSemana[s].carga)), borderColor: '#6b8cae', backgroundColor: 'rgba(107,140,174,0.12)', borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#6b8cae', tension: 0.3, fill: true }] },
    options: miniOptions
  });
}

init();
</script>
</body>
</html>
