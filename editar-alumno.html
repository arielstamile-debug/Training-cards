<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Rutina — Training Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f7f4ef;color:#1a1714;min-height:100vh;padding:32px 20px}
.container{max-width:680px;margin:0 auto}

.page-header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.brand-dot{width:28px;height:28px;background:#c8a45a;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-dot svg{width:15px;height:15px}
.page-title{font-size:20px;font-weight:800;letter-spacing:-.4px}
.page-sub{font-size:13px;color:#8a8278;margin-top:2px}
.back-link{margin-left:auto;font-size:12px;color:#c8a45a;font-weight:600;text-decoration:none;white-space:nowrap}

.info-bar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e8e4de;border-radius:12px;padding:14px 18px;margin-bottom:20px}
.info-avatar{width:36px;height:36px;border-radius:50%;background:#c8a45a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.info-name{font-size:15px;font-weight:700;color:#1a1714}
.info-meta{font-size:12px;color:#8a8278;margin-top:2px}
.info-badge{margin-left:auto;padding:5px 12px;background:#f0ede8;border-radius:20px;font-size:11px;font-weight:700;color:#8a6020;white-space:nowrap}

.card{background:#fff;border:1px solid #e8e4de;border-radius:14px;padding:24px;margin-bottom:20px}
.card-title{font-size:15px;font-weight:700;color:#1a1714;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-title-icon{font-size:18px}

/* Exercise form */
.ex-row{display:grid;grid-template-columns:2fr 1.4fr auto;gap:10px;align-items:end;padding:14px;background:#faf8f5;border-radius:10px;margin-bottom:8px;border:1px solid #f0ede8}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#8a8278}
.field input,.field select{padding:10px 12px;border:1.5px solid #e8e4de;border-radius:8px;font-size:14px;font-family:inherit;color:#1a1714;background:#fff;outline:none;transition:border .15s}
.field input:focus,.field select:focus{border-color:#c8a45a}
.field input::placeholder{color:#c4bdb5}
.nums-row{display:flex;gap:6px}
.nums-row input{width:56px;padding:10px 6px;border:1.5px solid #e8e4de;border-radius:8px;font-size:13px;font-family:inherit;outline:none;text-align:center;transition:border .15s}
.nums-row input:focus{border-color:#c8a45a}

.btn-add{padding:10px 16px;background:#c8a45a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;align-self:flex-end}
.btn-add:hover{background:#b8956a}

/* Exercise list */
.ex-list{margin-top:4px}
.ex-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border:1px solid #e8e4de;border-radius:10px;margin-bottom:6px;transition:all .15s}
.ex-item:hover{border-color:#d8d0c0}
.ex-num{width:24px;height:24px;border-radius:6px;background:#f0ede8;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#c4bdb5;flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-grupo{font-size:10px;color:#c8a45a;font-weight:600;text-transform:uppercase;margin-bottom:2px}
.ex-nombre{font-size:13px;font-weight:600;color:#1a1714}
.ex-meta{font-size:11px;color:#8a8278;margin-top:2px}
.ex-delete{background:none;border:none;color:#c4bdb5;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:6px;transition:all .15s;flex-shrink:0;line-height:1}
.ex-delete:hover{color:#e05555;background:#fff0f0}
.empty-list{font-size:12px;color:#c4bdb5;padding:16px 0;text-align:center}

.status-msg{padding:12px 16px;border-radius:8px;font-size:13px;font-weight:500;margin-top:12px;display:none}
.status-msg.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;display:block}
.status-msg.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;display:block}
.status-msg.loading{background:#fefce8;color:#92400e;border:1px solid #fde68a;display:block}

.btn-primary{width:100%;padding:13px;background:#1a1714;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:8px}
.btn-primary:hover{background:#333}

.skeleton{background:#f0ede8;border-radius:6px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Inline edit */
.ex-item{cursor:pointer}
.ex-item.editing{border-color:#c8a45a;background:#fdf8f0;flex-wrap:wrap;align-items:flex-start}
.ex-item.editing .ex-num{margin-top:2px}
.ex-edit-form{width:100%;margin-top:10px;display:flex;flex-direction:column;gap:8px}
.ex-edit-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.ex-edit-field{display:flex;flex-direction:column;gap:4px}
.ex-edit-field label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#8a8278}
.ex-edit-field input{padding:8px 10px;border:1.5px solid #e8e4de;border-radius:7px;font-size:13px;font-family:inherit;color:#1a1714;outline:none;transition:border .15s;background:#fff}
.ex-edit-field input:focus{border-color:#c8a45a}
.ex-edit-actions{display:flex;gap:6px;margin-top:2px}
.btn-save-inline{padding:8px 16px;background:#1a1714;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-save-inline:hover{background:#333}
.btn-cancel-inline{padding:8px 14px;background:#f0ede8;color:#8a8278;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-done{width:100%;padding:14px;background:#c8a45a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-done:hover{background:#b8956a}

/* Drag and drop */
.ex-drag-handle{display:flex;flex-direction:column;gap:3px;padding:4px 8px 4px 2px;cursor:grab;flex-shrink:0;opacity:.35;transition:opacity .15s}
.ex-drag-handle:hover{opacity:.7}
.ex-drag-handle span{display:block;width:16px;height:2px;background:#1a1714;border-radius:1px}
.ex-item.dragging{opacity:.4;border-style:dashed}
.ex-item.drag-over{border-color:#c8a45a;background:#fdf8f0}
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <div class="brand-dot">
      <svg viewBox="0 0 14 14" fill="none">
        <rect x="1" y="1" width="4.5" height="12" rx="1.2" fill="#111"/>
        <rect x="8" y="1" width="4.5" height="7" rx="1.2" fill="#111"/>
      </svg>
    </div>
    <div>
      <div class="page-title">Editar rutina</div>
      <div class="page-sub" id="page-sub">Cargando...</div>
    </div>
    <a href="training-cards.html" class="back-link">← Volver</a>
  </div>

  <div class="info-bar" id="info-bar">
    <div class="skeleton" style="width:36px;height:36px;border-radius:50%"></div>
    <div style="flex:1">
      <div class="skeleton" style="width:120px;height:14px;margin-bottom:6px"></div>
      <div class="skeleton" style="width:80px;height:10px"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="card-title-icon">➕</span> Agregar ejercicio</div>

    <div class="ex-row">
      <div style="display:flex;flex-direction:column;gap:8px">
        <div class="field">
          <label>Grupo muscular</label>
          <input type="text" id="ej-grupo" placeholder="Ej: Pecho" list="grupos-list">
          <datalist id="grupos-list">
            <option value="Pecho"><option value="Espalda"><option value="Hombros">
            <option value="Bíceps"><option value="Tríceps"><option value="Piernas">
            <option value="Glúteos"><option value="Abs"><option value="Core">
            <option value="Torso Tracción"><option value="Torso Empuje">
            <option value="Piernas Tracción"><option value="Piernas Empuje">
          </datalist>
        </div>
        <div class="field">
          <label>Ejercicio</label>
          <input type="text" id="ej-nombre" placeholder="Nombre del ejercicio">
        </div>
      </div>
      <div class="field">
        <label>Ser / Rep / Kg</label>
        <div class="nums-row">
          <input type="number" id="ej-series" placeholder="Ser" min="1" max="10">
          <input type="number" id="ej-reps"   placeholder="Rep" min="1" max="50">
          <input type="number" id="ej-carga"  placeholder="Kg"  min="0" step="0.5">
        </div>
      </div>
      <div class="field">
        <label>T. Trabajo / T. Descanso</label>
        <div class="nums-row">
          <input type="text" id="ej-tt" placeholder="Ej: 40s" style="width:80px">
          <input type="text" id="ej-td" placeholder="Ej: 60s" style="width:80px">
        </div>
      </div>
      <button class="btn-add" onclick="agregarEjercicio()">+ Agregar</button>
    </div>

    <div id="status-add" class="status-msg"></div>
  </div>

  <div class="card">
    <div class="card-title"><span class="card-title-icon">🏋️</span> Ejercicios del día <span id="ex-count" style="font-size:12px;color:#8a8278;font-weight:500"></span></div>
    <div id="ex-list-display" class="ex-list">
      <div class="skeleton" style="height:58px;border-radius:10px;margin-bottom:6px"></div>
      <div class="skeleton" style="height:58px;border-radius:10px;margin-bottom:6px"></div>
      <div class="skeleton" style="height:58px;border-radius:10px"></div>
    </div>
    <div id="status-list" class="status-msg"></div>
  </div>

  <button class="btn-done" onclick="volverAlPlanificador()">
    ✓ Terminado — Volver al planificador
  </button>

</div>

<script>
const SUPABASE_URL = 'https://dclljrcwaddwbepfrgkv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjbGxqcmN3YWRkd2JlcGZyZ2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyODM5MzYsImV4cCI6MjA5NTg1OTkzNn0.L5KOnUELiXUBHao8IdKVLciTrs2fwIS1a6Uqq6WCWP0';

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

// Parse URL params: ?alumno_id=X&sesion_id=Y
const params     = new URLSearchParams(window.location.search);
const alumnoId   = params.get('alumno_id');
const sesionId   = params.get('sesion_id');

let ejercicios   = [];   // [{id, grupo_muscular, ejercicio, series, reps, carga}]
let alumnoData   = null; // {nombre, objetivo}
let sesionData   = null; // {semana, dia, fecha}

// ── INIT ──────────────────────────────────────────────────────────────
async function init() {
  if (!alumnoId || !sesionId) {
    showError('Parámetros inválidos. Accedé desde el planificador.');
    return;
  }
  await Promise.all([loadAlumno(), loadSesion(), loadEjercicios()]);
  renderInfoBar();
}

async function loadAlumno() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/alumnos?id=eq.${alumnoId}&select=nombre,objetivo`, { headers });
  const data = await res.json();
  alumnoData = data[0] || null;
}

async function loadSesion() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/sesiones?id=eq.${sesionId}&select=semana,dia,fecha`, { headers });
  const data = await res.json();
  sesionData = data[0] || null;
}

async function loadEjercicios() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/ejercicios?sesion_id=eq.${sesionId}&order=orden,id`, { headers });
  ejercicios = await res.json();
  renderList();
}

function renderInfoBar() {
  if (!alumnoData || !sesionData) return;
  const initials = (alumnoData.nombre||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('page-sub').textContent = `${alumnoData.nombre} — Sem ${sesionData.semana}, Día ${sesionData.dia}`;
  document.getElementById('info-bar').innerHTML = `
    <div class="info-avatar">${initials}</div>
    <div>
      <div class="info-name">${alumnoData.nombre}</div>
      <div class="info-meta">${alumnoData.objetivo || ''} · ${sesionData.fecha || ''}</div>
    </div>
    <div class="info-badge">Sem ${sesionData.semana} · Día ${sesionData.dia}</div>
  `;
}

let editingId = null;
let dragSrcId = null;

function escapeStr(s) {
  return (s||'').replace(/'/g, "\\'");
}

function escapeAttr(s) {
  return (s||'').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderList() {
  const el = document.getElementById('ex-list-display');
  document.getElementById('ex-count').textContent = ejercicios.length ? `(${ejercicios.length})` : '';

  if (!ejercicios.length) {
    el.innerHTML = '<div class="empty-list">Sin ejercicios cargados en este día</div>';
    return;
  }

  el.innerHTML = ejercicios.map((ex, i) => {
    const isEditing = editingId === ex.id;
    return `
    <div class="ex-item${isEditing ? ' editing' : ''}" id="item-${ex.id}"
      draggable="${!isEditing}"
      ondragstart="onDragStart(event,${ex.id})"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event,${ex.id})"
      ondragend="onDragEnd(event)"
      ${!isEditing ? `onclick="abrirEdicion(${ex.id})"` : ''}>
      <div class="ex-drag-handle" onclick="event.stopPropagation()" ondragstart="event.stopPropagation()" title="Arrastrar para reordenar">
        <span></span><span></span><span></span>
      </div>
      <div class="ex-num">${i + 1}</div>
      <div class="ex-info" style="flex:1;min-width:0">
        <div class="ex-grupo">${ex.grupo_muscular || ''}</div>
        <div class="ex-nombre">${ex.ejercicio}</div>
        ${!isEditing ? `<div class="ex-meta">${ex.series} series · ${ex.reps} reps · ${ex.carga > 0 ? ex.carga + 'kg' : '—'}${ex.tiempo_trabajo ? ' · ' + ex.tiempo_trabajo : ''}${ex.tiempo_descanso ? ' / ' + ex.tiempo_descanso : ''}</div>` : ''}
      </div>
      ${!isEditing
        ? `<button class="ex-delete" onclick="event.stopPropagation();eliminarEjercicio(${ex.id}, '${escapeStr(ex.ejercicio)}')" title="Eliminar">✕</button>`
        : `<button class="ex-delete" onclick="cancelarEdicion()" title="Cancelar" style="color:#c8a45a">✕</button>`
      }
      ${isEditing ? `
        <div class="ex-edit-form" onclick="event.stopPropagation()">
          <div class="ex-edit-row">
            <div class="ex-edit-field" style="flex:1;min-width:120px">
              <label>Grupo muscular</label>
              <input type="text" id="edit-grupo-${ex.id}" value="${escapeAttr(ex.grupo_muscular)}" list="grupos-list">
            </div>
            <div class="ex-edit-field" style="flex:2;min-width:160px">
              <label>Ejercicio</label>
              <input type="text" id="edit-nombre-${ex.id}" value="${escapeAttr(ex.ejercicio)}">
            </div>
          </div>
          <div class="ex-edit-row">
            <div class="ex-edit-field">
              <label>Series</label>
              <input type="number" id="edit-series-${ex.id}" value="${ex.series}" min="1" max="20" style="width:64px">
            </div>
            <div class="ex-edit-field">
              <label>Reps</label>
              <input type="number" id="edit-reps-${ex.id}" value="${ex.reps}" min="0" max="100" style="width:64px">
            </div>
            <div class="ex-edit-field">
              <label>Carga (kg)</label>
              <input type="number" id="edit-carga-${ex.id}" value="${ex.carga}" min="0" step="0.5" style="width:80px">
            </div>
          </div>
          <div class="ex-edit-row">
            <div class="ex-edit-field" style="flex:1">
              <label>T. Trabajo</label>
              <input type="text" id="edit-tt-${ex.id}" value="${escapeAttr(ex.tiempo_trabajo||'')}" placeholder="Ej: 40s" style="width:100%">
            </div>
            <div class="ex-edit-field" style="flex:1">
              <label>T. Descanso</label>
              <input type="text" id="edit-td-${ex.id}" value="${escapeAttr(ex.tiempo_descanso||'')}" placeholder="Ej: 60s" style="width:100%">
            </div>
          </div>
          <div class="ex-edit-actions">
            <button class="btn-save-inline" onclick="guardarEdicion(${ex.id})">Guardar</button>
            <button class="btn-cancel-inline" onclick="cancelarEdicion()">Cancelar</button>
          </div>
          <div id="edit-status-${ex.id}" class="status-msg"></div>
        </div>
      ` : ''}
    </div>`;
  }).join('');
}

// ── DRAG AND DROP ─────────────────────────────────────────────────────
function onDragStart(e, id) {
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => document.getElementById('item-' + id)?.classList.add('dragging'), 0);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDragEnd(e) {
  document.querySelectorAll('.ex-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
}

async function onDrop(e, targetId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragSrcId === targetId) return;

  // Reorder array
  const srcIdx = ejercicios.findIndex(ex => ex.id === dragSrcId);
  const tgtIdx = ejercicios.findIndex(ex => ex.id === targetId);
  if (srcIdx === -1 || tgtIdx === -1) return;

  const moved = ejercicios.splice(srcIdx, 1)[0];
  ejercicios.splice(tgtIdx, 0, moved);

  // Assign new orden values
  ejercicios.forEach((ex, i) => { ex.orden = i + 1; });
  renderList();

  // PATCH all orden values to Supabase
  const status = document.getElementById('status-list');
  showStatus(status, 'loading', 'Guardando orden...');
  try {
    await Promise.all(ejercicios.map(ex =>
      fetch(`${SUPABASE_URL}/rest/v1/ejercicios?id=eq.${ex.id}`, {
        method: 'PATCH',
        headers,
        body: JSON.stringify({ orden: ex.orden })
      })
    ));
    showStatus(status, 'success', '✓ Orden guardado.');
    setTimeout(() => { status.style.display = 'none'; }, 2000);
  } catch(err) {
    showStatus(status, 'error', 'Error al guardar orden: ' + err.message);
  }
}

function abrirEdicion(id) {
  editingId = id;
  renderList();
  setTimeout(() => {
    const el = document.getElementById('edit-grupo-' + id);
    if (el) el.focus();
  }, 30);
}

function cancelarEdicion() {
  editingId = null;
  renderList();
}

async function guardarEdicion(id) {
  const grupo  = document.getElementById('edit-grupo-'  + id).value.trim();
  const nombre = document.getElementById('edit-nombre-' + id).value.trim();
  const series = parseInt(document.getElementById('edit-series-' + id).value) || 0;
  const reps   = parseInt(document.getElementById('edit-reps-'   + id).value) || 0;
  const carga  = parseFloat(document.getElementById('edit-carga-' + id).value) || 0;
  const tt     = document.getElementById('edit-tt-' + id).value.trim();
  const td     = document.getElementById('edit-td-' + id).value.trim();
  const status = document.getElementById('edit-status-' + id);

  if (!grupo || !nombre || !series) {
    showStatus(status, 'error', 'Completá grupo, ejercicio y series.');
    return;
  }

  showStatus(status, 'loading', 'Guardando...');

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/ejercicios?id=eq.${id}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify({ grupo_muscular: grupo, ejercicio: nombre, series, reps, carga, tiempo_trabajo: tt, tiempo_descanso: td })
    });
    if (!res.ok) throw new Error(await res.text());

    const idx = ejercicios.findIndex(e => e.id === id);
    if (idx !== -1) ejercicios[idx] = { ...ejercicios[idx], grupo_muscular: grupo, ejercicio: nombre, series, reps, carga, tiempo_trabajo: tt, tiempo_descanso: td };

    editingId = null;
    renderList();

    const statusList = document.getElementById('status-list');
    showStatus(statusList, 'success', `✓ ${nombre} actualizado.`);
    setTimeout(() => { statusList.style.display = 'none'; }, 2000);

  } catch(e) {
    showStatus(status, 'error', 'Error: ' + e.message);
  }
}

function volverAlPlanificador() {
  window.location.href = 'training-cards.html';
}

// ── AGREGAR ───────────────────────────────────────────────────────────
async function agregarEjercicio() {
  const grupo  = document.getElementById('ej-grupo').value.trim();
  const nombre = document.getElementById('ej-nombre').value.trim();
  const series = parseInt(document.getElementById('ej-series').value) || 0;
  const reps   = parseInt(document.getElementById('ej-reps').value)   || 0;
  const carga  = parseFloat(document.getElementById('ej-carga').value) || 0;
  const tt     = document.getElementById('ej-tt').value.trim();
  const td     = document.getElementById('ej-td').value.trim();
  const status = document.getElementById('status-add');

  if (!grupo || !nombre || !series) {
    showStatus(status, 'error', 'Completá grupo, ejercicio y series.');
    return;
  }

  showStatus(status, 'loading', 'Guardando...');

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/ejercicios`, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        sesion_id: parseInt(sesionId),
        alumno_id: parseInt(alumnoId),
        grupo_muscular: grupo,
        ejercicio: nombre,
        series, reps, carga,
        tiempo_trabajo: tt || null,
        tiempo_descanso: td || null,
        orden: ejercicios.length + 1
      })
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    ejercicios.push(data[0]);
    renderList();

    // Limpiar form
    document.getElementById('ej-nombre').value = '';
    document.getElementById('ej-series').value = '';
    document.getElementById('ej-reps').value   = '';
    document.getElementById('ej-carga').value  = '';
    document.getElementById('ej-tt').value     = '';
    document.getElementById('ej-td').value     = '';
    document.getElementById('ej-grupo').focus();

    showStatus(status, 'success', `✓ ${nombre} agregado.`);
    setTimeout(() => status.style.display = 'none', 2500);

  } catch(e) {
    showStatus(status, 'error', 'Error: ' + e.message);
  }
}

// ── ELIMINAR ──────────────────────────────────────────────────────────
async function eliminarEjercicio(id, nombre) {
  const status = document.getElementById('status-list');

  // Feedback visual inmediato
  const item = document.getElementById(`item-${id}`);
  if (item) item.style.opacity = '0.4';

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/ejercicios?id=eq.${id}`, {
      method: 'DELETE',
      headers
    });
    if (!res.ok) throw new Error(await res.text());

    ejercicios = ejercicios.filter(e => e.id !== id);
    renderList();
    showStatus(status, 'success', `✓ ${nombre} eliminado.`);
    setTimeout(() => status.style.display = 'none', 2500);

  } catch(e) {
    if (item) item.style.opacity = '1';
    showStatus(status, 'error', 'Error al eliminar: ' + e.message);
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────
function showStatus(el, type, msg) {
  el.className = `status-msg ${type}`;
  el.textContent = msg;
}

function showError(msg) {
  document.querySelector('.container').innerHTML = `
    <div style="text-align:center;padding:80px 20px;color:#8a8278">
      <div style="font-size:48px;margin-bottom:16px">⚠️</div>
      <div style="font-size:16px;font-weight:700;color:#1a1714;margin-bottom:8px">Error</div>
      <div style="font-size:13px;margin-bottom:24px">${msg}</div>
      <a href="training-cards.html" style="color:#c8a45a;font-weight:600;font-size:13px">← Volver al planificador</a>
    </div>`;
}

init();
</script>
