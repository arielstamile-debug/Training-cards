<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Rutina — Training Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f7f4ef;color:#1a1714;min-height:100vh;padding:32px 20px}
.container{max-width:680px;margin:0 auto}

.page-header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.brand-dot{width:28px;height:28px;background:#c8a45a;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-dot svg{width:15px;height:15px}
.page-title{font-size:20px;font-weight:800;letter-spacing:-.4px}
.page-sub{font-size:13px;color:#8a8278;margin-top:2px}
.back-link{margin-left:auto;font-size:12px;color:#c8a45a;font-weight:600;text-decoration:none;white-space:nowrap}

.info-bar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e8e4de;border-radius:12px;padding:14px 18px;margin-bottom:20px;position:relative}
.info-avatar{width:36px;height:36px;border-radius:50%;background:#c8a45a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.info-name{font-size:15px;font-weight:700;color:#1a1714}
.info-meta{font-size:12px;color:#8a8278;margin-top:2px}
.info-badge{margin-left:auto;padding:5px 12px;background:#f0ede8;border-radius:20px;font-size:11px;font-weight:700;color:#8a6020;white-space:nowrap;border:none;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s}
.info-badge:hover{background:#e0d9ce}
.info-badge .cal-ic{font-size:10px;opacity:.6}

.info-name-wrap{display:flex;align-items:center;gap:6px;cursor:pointer}
.info-name-edit-ic{font-size:11px;opacity:.35;transition:opacity .15s}
.info-name-wrap:hover .info-name-edit-ic{opacity:.7}
.name-popover{position:absolute;top:calc(100% + 8px);left:0;background:#fff;border:1px solid #e8e4de;border-radius:14px;box-shadow:0 12px 32px rgba(26,23,20,.14);padding:16px;width:260px;z-index:100;display:none}
.name-popover.open{display:block}
.name-popover label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#8a8278;display:block;margin-bottom:6px}
.name-popover input{width:100%;padding:10px 12px;border:1.5px solid #e8e4de;border-radius:8px;font-size:14px;font-family:inherit;color:#1a1714;outline:none;transition:border .15s;margin-bottom:10px}
.name-popover input:focus{border-color:#c8a45a}
.name-popover-actions{display:flex;gap:8px}
.name-popover-actions button{flex:1;padding:9px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-save-name{background:#1a1714;color:#fff}
.btn-save-name:hover{background:#333}
.btn-cancel-name{background:#f0ede8;color:#8a8278}
.name-saving{font-size:11px;color:#c8a45a;font-weight:600;margin-top:2px;min-height:14px}

/* Mini calendar popover */
.cal-popover{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:1px solid #e8e4de;border-radius:14px;box-shadow:0 12px 32px rgba(26,23,20,.14);padding:16px;width:268px;z-index:100;display:none}
.cal-popover.open{display:block}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav{background:#f0ede8;border:none;border-radius:7px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:#8a8278;font-family:inherit;transition:background .15s;padding:0}
.cal-nav:hover{background:#e0d9ce;color:#1a1714}
.cal-month-label{font-size:13px;font-weight:700;color:#1a1714;text-transform:capitalize}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:10px;font-weight:700;color:#c4bdb5;text-align:center;padding-bottom:4px}
.cal-day{font-size:12px;font-weight:500;color:#1a1714;text-align:center;padding:6px 0;border-radius:7px;cursor:pointer;background:none;border:none;font-family:inherit;transition:all .12s;width:100%}
.cal-day:hover:not(:disabled){background:#f0ede8}
.cal-day.muted{color:#d0cac0}
.cal-day.today{color:#c8a45a;font-weight:800}
.cal-day.selected{background:#1a1714 !important;color:#fff !important;font-weight:700}
.cal-foot{margin-top:12px;padding-top:10px;border-top:1px solid #f0ede8;font-size:11px;color:#8a8278;line-height:1.6}
.cal-saving{font-size:11px;color:#c8a45a;font-weight:600;margin-top:6px;text-align:center;min-height:16px}

.card{background:#fff;border:1px solid #e8e4de;border-radius:14px;padding:24px;margin-bottom:20px}
.card-title{font-size:15px;font-weight:700;color:#1a1714;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-title-icon{font-size:18px}

/* Exercise form */
.ex-row{display:flex;flex-direction:column;gap:10px;padding:14px;background:#faf8f5;border-radius:10px;margin-bottom:8px;border:1px solid #f0ede8}
.ex-row-top{display:flex;gap:8px;align-items:flex-end}
.ex-row-bottom{display:flex;gap:6px;align-items:center}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#8a8278}
.field input,.field select{padding:10px 12px;border:1.5px solid #e8e4de;border-radius:8px;font-size:14px;font-family:inherit;color:#1a1714;background:#fff;outline:none;transition:border .15s}
.field input:focus,.field select:focus{border-color:#c8a45a}
.field input::placeholder{color:#c4bdb5}
.ex-row-top .field input{padding:9px 10px;font-size:13px}
.nums-row{display:flex;gap:5px}
.nums-row input{min-width:0;width:52px;padding:10px 4px;border:1.5px solid #e8e4de;border-radius:8px;font-size:13px;font-family:inherit;outline:none;text-align:center;transition:border .15s}
.nums-row input:focus{border-color:#c8a45a}

.btn-add{padding:10px 16px;background:#c8a45a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;align-self:flex-end}
.btn-add:hover{background:#b8956a}

/* Exercise list */
.ex-list{margin-top:4px}
.ex-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border:1px solid #e8e4de;border-radius:10px;margin-bottom:6px;transition:all .15s}
.ex-item:hover{border-color:#d8d0c0}
.ex-num{width:24px;height:24px;border-radius:6px;background:#f0ede8;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#c4bdb5;flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-grupo{font-size:10px;color:#c8a45a;font-weight:600;text-transform:uppercase;margin-bottom:2px}
.ex-nombre{font-size:13px;font-weight:600;color:#1a1714}
.ex-meta{font-size:11px;color:#8a8278;margin-top:2px}
.ex-delete{background:none;border:none;color:#c4bdb5;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:6px;transition:all .15s;flex-shrink:0;line-height:1}
.ex-delete:hover{color:#e05555;background:#fff0f0}
.empty-list{font-size:12px;color:#c4bdb5;padding:16px 0;text-align:center}

.status-msg{padding:12px 16px;border-radius:8px;font-size:13px;font-weight:500;margin-top:12px;display:none}
.status-msg.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;display:block}
.status-msg.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;display:block}
.status-msg.loading{background:#fefce8;color:#92400e;border:1px solid #fde68a;display:block}

.btn-primary{width:100%;padding:13px;background:#1a1714;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:8px}
.btn-primary:hover{background:#333}

.skeleton{background:#f0ede8;border-radius:6px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Inline edit */
.ex-item{cursor:pointer}
.ex-item.editing{border-color:#c8a45a;background:#fdf8f0;flex-wrap:wrap;align-items:flex-start}
.ex-item.editing .ex-num{margin-top:2px}
.ex-edit-form{width:100%;margin-top:10px;display:flex;flex-direction:column;gap:8px}
.ex-edit-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.ex-edit-field{display:flex;flex-direction:column;gap:4px}
.ex-edit-field label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#8a8278}
.ex-edit-field input{padding:8px 10px;border:1.5px solid #e8e4de;border-radius:7px;font-size:13px;font-family:inherit;color:#1a1714;outline:none;transition:border .15s;background:#fff}
.ex-edit-field input:focus{border-color:#c8a45a}
.ex-edit-actions{display:flex;gap:6px;margin-top:2px}
.btn-save-inline{padding:8px 16px;background:#1a1714;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-save-inline:hover{background:#333}
.btn-cancel-inline{padding:8px 14px;background:#f0ede8;color:#8a8278;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-done{width:100%;padding:14px;background:#c8a45a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-done:hover{background:#b8956a}

/* Cardio block */
.section-toggle{display:flex;align-items:center;gap:8px;margin-top:16px;margin-bottom:0;cursor:pointer;user-select:none}
.section-toggle-label{font-size:12px;font-weight:700;color:#8a8278;letter-spacing:.5px;text-transform:uppercase}
.section-toggle-icon{font-size:14px;transition:transform .2s}
.section-toggle.open .section-toggle-icon{transform:rotate(90deg)}
.cardio-block{margin-top:12px;padding:14px;background:#f7f4ef;border-radius:10px;border:1px solid #ede9e2;display:none}
.cardio-block.open{display:block}
.cardio-tag{display:inline-block;padding:3px 10px;background:#e8dfc8;border-radius:20px;font-size:10px;font-weight:700;color:#8a6020;margin-bottom:12px;letter-spacing:.4px;text-transform:uppercase}

/* Drag and drop */
.ex-drag-handle{display:flex;flex-direction:column;gap:3px;padding:4px 8px 4px 2px;cursor:grab;flex-shrink:0;opacity:.35;transition:opacity .15s}
.ex-drag-handle:hover{opacity:.7}
.ex-drag-handle span{display:block;width:16px;height:2px;background:#1a1714;border-radius:1px}
.ex-item.dragging{opacity:.4;border-style:dashed}
.ex-item.drag-over{border-color:#c8a45a;background:#fdf8f0}
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <div class="brand-dot">
      <svg viewBox="0 0 14 14" fill="none">
        <rect x="1" y="1" width="4.5" height="12" rx="1.2" fill="#111"/>
        <rect x="8" y="1" width="4.5" height="7" rx="1.2" fill="#111"/>
      </svg>
    </div>
    <div>
      <div class="page-title">Editar rutina</div>
      <div class="page-sub" id="page-sub">Cargando...</div>
    </div>
    <a href="training-cards.html" class="back-link">← Volver</a>
  </div>

  <div class="info-bar" id="info-bar">
    <div class="skeleton" style="width:36px;height:36px;border-radius:50%"></div>
    <div style="flex:1">
      <div class="skeleton" style="width:120px;height:14px;margin-bottom:6px"></div>
      <div class="skeleton" style="width:80px;height:10px"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="card-title-icon">➕</span> Agregar ejercicio</div>

    <div class="ex-row">
      <div class="ex-row-top">
        <div class="field" style="flex:1">
          <label>Grupo muscular</label>
          <input type="text" id="ej-grupo" placeholder="Ej: Pecho" list="grupos-list">
          <datalist id="grupos-list">
            <option value="Pecho"><option value="Espalda"><option value="Hombros">
            <option value="Bíceps"><option value="Tríceps"><option value="Piernas">
            <option value="Glúteos"><option value="Abs"><option value="Core">
            <option value="Torso Tracción"><option value="Torso Empuje">
            <option value="Piernas Tracción"><option value="Piernas Empuje">
          </datalist>
        </div>
        <div class="field" style="flex:2">
          <label>Ejercicio</label>
          <input type="text" id="ej-nombre" placeholder="Nombre del ejercicio">
        </div>
      </div>
      <div class="ex-row-bottom">
        <input type="number" id="ej-series" placeholder="Series" min="1" max="10" title="Series" style="width:72px;padding:10px 6px;border:1.5px solid #e8e4de;border-radius:8px;font-size:13px;font-family:inherit;outline:none;text-align:center">
        <input type="number" id="ej-reps"   placeholder="Reps"   min="1" max="50" title="Reps"   style="width:72px;padding:10px 6px;border:1.5px solid #e8e4de;border-radius:8px;font-size:13px;font-family:inherit;outline:none;text-align:center">
        <input type="number" id="ej-carga"  placeholder="Kg"     min="0" step="0.5" title="Carga" style="width:72px;padding:10px 6px;border:1.5px solid #e8e4de;border-radius:8px;font-size:13px;font-family:inherit;outline:none;text-align:center">
        <div style="width:1px;height:32px;background:#e8e4de;margin:0 2px"></div>
        <input type="text" id="ej-tt" placeholder="T. Trabajo" title="Tiempo de trabajo" style="width:90px;padding:10px 6px;border:1.5px solid #e8e4de;border-radius:8px;font-size:13px;font-family:inherit;outline:none;text-align:center">
        <input type="text" id="ej-td" placeholder="T. Descanso" title="Tiempo de descanso" style="width:90px;padding:10px 6px;border:1.5px solid #e8e4de;border-radius:8px;font-size:13px;font-family:inherit;outline:none;text-align:center">
        <button class="btn-add" style="margin-left:auto" onclick="agregarEjercicio()">+ Agregar</button>
      </div>
    </div>

    <!-- Cardio / HIIT block -->
    <div class="section-toggle" onclick="toggleCardioBlock(this)">
      <span class="section-toggle-icon">▶</span>
      <span class="section-toggle-label">Cardio / HIIT / Intervalo</span>
    </div>
    <div class="cardio-block" id="cardio-block">
      <div class="cardio-tag">Cardio · HIIT · Intervalo</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <div class="field" style="flex:1;min-width:120px">
            <label>Tipo</label>
            <input type="text" id="crd-grupo" placeholder="Ej: Cardio, HIIT" list="cardio-list">
            <datalist id="cardio-list">
              <option value="Cardio"><option value="HIIT"><option value="Intervalo">
              <option value="Entrada en calor"><option value="Vuelta a la calma">
            </datalist>
          </div>
          <div class="field" style="flex:2;min-width:180px">
            <label>Actividad</label>
            <input type="text" id="crd-nombre" placeholder="Ej: Caminata, Salto a la soga, Cinta...">
          </div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
          <div class="field">
            <label>Series</label>
            <input type="number" id="crd-series" placeholder="0" min="0" style="width:64px">
          </div>
          <div class="field">
            <label>Reps</label>
            <input type="number" id="crd-reps" placeholder="0" min="0" style="width:64px">
          </div>
          <div class="field">
            <label>Carga kg</label>
            <input type="number" id="crd-carga" placeholder="0" min="0" step="0.5" style="width:70px">
          </div>
          <div class="field">
            <label>T. Trabajo</label>
            <input type="text" id="crd-tt" placeholder="Ej: 30s, 1min, 20min" style="width:110px">
          </div>
          <div class="field">
            <label>T. Descanso</label>
            <input type="text" id="crd-td" placeholder="Ej: 15s, 1min" style="width:110px">
          </div>
          <button class="btn-add" onclick="agregarCardio()" style="margin-top:0">+ Agregar</button>
        </div>
      </div>
    </div>

    <div id="status-add" class="status-msg"></div>
  </div>

  <div class="card">
    <div class="card-title"><span class="card-title-icon">🏋️</span> Ejercicios del día <span id="ex-count" style="font-size:12px;color:#8a8278;font-weight:500"></span></div>
    <div id="ex-list-display" class="ex-list">
      <div class="skeleton" style="height:58px;border-radius:10px;margin-bottom:6px"></div>
      <div class="skeleton" style="height:58px;border-radius:10px;margin-bottom:6px"></div>
      <div class="skeleton" style="height:58px;border-radius:10px"></div>
    </div>
    <div id="status-list" class="status-msg"></div>
  </div>

  <button class="btn-done" onclick="volverAlPlanificador()">
    ✓ Terminado — Volver al planificador
  </button>

</div>

<script>
const SUPABASE_URL = 'https://dclljrcwaddwbepfrgkv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjbGxqcmN3YWRkd2JlcGZyZ2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyODM5MzYsImV4cCI6MjA5NTg1OTkzNn0.L5KOnUELiXUBHao8IdKVLciTrs2fwIS1a6Uqq6WCWP0';

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

// Parse URL params: ?alumno_id=X&sesion_id=Y
const params     = new URLSearchParams(window.location.search);
const alumnoId   = params.get('alumno_id');
const sesionId   = params.get('sesion_id');

let ejercicios   = [];   // [{id, grupo_muscular, ejercicio, series, reps, carga}]
let alumnoData   = null; // {nombre, objetivo}
let sesionData   = null; // {semana, dia, fecha}

// ── INIT ──────────────────────────────────────────────────────────────
async function init() {
  if (!alumnoId || !sesionId) {
    showError('Parámetros inválidos. Accedé desde el planificador.');
    return;
  }
  await Promise.all([loadAlumno(), loadSesion(), loadEjercicios()]);
  renderInfoBar();
}

async function loadAlumno() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/alumnos?id=eq.${alumnoId}&select=nombre,objetivo,fecha_inicio`, { headers });
  const data = await res.json();
  alumnoData = data[0] || null;
}

async function loadSesion() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/sesiones?id=eq.${sesionId}&select=semana,dia,fecha`, { headers });
  const data = await res.json();
  sesionData = data[0] || null;
}

async function loadEjercicios() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/ejercicios?sesion_id=eq.${sesionId}&order=orden,id`, { headers });
  ejercicios = await res.json();
  renderList();
}

function renderInfoBar() {
  if (!alumnoData || !sesionData) return;
  const initials = (alumnoData.nombre||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('page-sub').textContent = `${alumnoData.nombre} — Sem ${sesionData.semana}, Día ${sesionData.dia}`;
  document.getElementById('info-bar').innerHTML = `
    <div class="info-avatar">${initials}</div>
    <div style="position:relative">
      <div class="info-name-wrap" onclick="toggleNamePopover(event)" id="name-badge-btn">
        <div class="info-name">${escapeAttr(alumnoData.nombre)}</div>
        <span class="info-name-edit-ic">✎</span>
      </div>
      <div class="info-meta" id="info-meta-fecha">${alumnoData.objetivo || ''} · ${sesionData.fecha || ''}</div>
      <div class="name-popover" id="name-popover">
        <label>Nombre del alumno</label>
        <input type="text" id="name-input" value="${escapeAttr(alumnoData.nombre)}">
        <div class="name-popover-actions">
          <button class="btn-save-name" onclick="guardarNombre()">Guardar</button>
          <button class="btn-cancel-name" onclick="closeNamePopover()">Cancelar</button>
        </div>
        <div class="name-saving" id="name-saving"></div>
      </div>
    </div>
    <button class="info-badge" onclick="toggleCalendar(event)" id="badge-btn">
      <span class="cal-ic">📅</span>
      Sem ${sesionData.semana} · Día ${sesionData.dia}
    </button>
    <div class="cal-popover" id="cal-popover">
      <div class="cal-head">
        <button class="cal-nav" onclick="calNav(-1)">‹</button>
        <span class="cal-month-label" id="cal-month-label"></span>
        <button class="cal-nav" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-foot" id="cal-foot"></div>
      <div class="cal-saving" id="cal-saving"></div>
    </div>
  `;
  // close popovers when clicking outside
  document.addEventListener('click', outsideCalendarClick);
  document.addEventListener('click', outsideNamePopoverClick);
}

let editingId = null;
let dragSrcId = null;

function escapeStr(s) {
  return (s||'').replace(/'/g, "\\'");
}

function escapeAttr(s) {
  return (s||'').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderList() {
  const el = document.getElementById('ex-list-display');
  document.getElementById('ex-count').textContent = ejercicios.length ? `(${ejercicios.length})` : '';

  if (!ejercicios.length) {
    el.innerHTML = '<div class="empty-list">Sin ejercicios cargados en este día</div>';
    return;
  }

  el.innerHTML = ejercicios.map((ex, i) => {
    const isEditing = editingId === ex.id;
    return `
    <div class="ex-item${isEditing ? ' editing' : ''}" id="item-${ex.id}"
      draggable="${!isEditing}"
      ondragstart="onDragStart(event,${ex.id})"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event,${ex.id})"
      ondragend="onDragEnd(event)"
      ${!isEditing ? `onclick="abrirEdicion(${ex.id})"` : ''}>
      <div class="ex-drag-handle" onclick="event.stopPropagation()" ondragstart="event.stopPropagation()" title="Arrastrar para reordenar">
        <span></span><span></span><span></span>
      </div>
      <div class="ex-num">${i + 1}</div>
      <div class="ex-info" style="flex:1;min-width:0">
        <div class="ex-grupo">${ex.grupo_muscular || ''}</div>
        <div class="ex-nombre">${ex.ejercicio}</div>
        ${!isEditing ? `<div class="ex-meta">${ex.series} series · ${ex.reps} reps · ${ex.carga > 0 ? ex.carga + 'kg' : '—'}${ex.tiempo_trabajo ? ' · ' + ex.tiempo_trabajo : ''}${ex.tiempo_descanso ? ' / ' + ex.tiempo_descanso : ''}</div>` : ''}
      </div>
      ${!isEditing
        ? `<button class="ex-delete" onclick="event.stopPropagation();eliminarEjercicio(${ex.id}, '${escapeStr(ex.ejercicio)}')" title="Eliminar">✕</button>`
        : `<button class="ex-delete" onclick="cancelarEdicion()" title="Cancelar" style="color:#c8a45a">✕</button>`
      }
      ${isEditing ? `
        <div class="ex-edit-form" onclick="event.stopPropagation()">
          <div class="ex-edit-row">
            <div class="ex-edit-field" style="flex:1;min-width:120px">
              <label>Grupo muscular</label>
              <input type="text" id="edit-grupo-${ex.id}" value="${escapeAttr(ex.grupo_muscular)}" list="grupos-list">
            </div>
            <div class="ex-edit-field" style="flex:2;min-width:160px">
              <label>Ejercicio</label>
              <input type="text" id="edit-nombre-${ex.id}" value="${escapeAttr(ex.ejercicio)}">
            </div>
          </div>
          <div class="ex-edit-row">
            <div class="ex-edit-field">
              <label>Series</label>
              <input type="number" id="edit-series-${ex.id}" value="${ex.series}" min="1" max="20" style="width:64px">
            </div>
            <div class="ex-edit-field">
              <label>Reps</label>
              <input type="number" id="edit-reps-${ex.id}" value="${ex.reps}" min="0" max="100" style="width:64px">
            </div>
            <div class="ex-edit-field">
              <label>Carga (kg)</label>

          <div class="ex-edit-row">

              <input type="text" id="edit-tt-${ex.id}" value="${escapeAttr(ex.tiempo_trabajo||'')}" placeholder="Ej: 40s" style="width:100%">

// ── DRAG AND DROP ─────────────────────────────────────────────────────
function onDragStart(e, id) {
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => document.getElementById('item-' + id)?.classList.add('dragging'), 0);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDragEnd(e) {
  document.querySelectorAll('.ex-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
}

async function onDrop(e, targetId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragSrcId === targetId) return;

  // Reorder array
  const srcIdx = ejercicios.findIndex(ex => ex.id === dragSrcId);
  const tgtIdx = ejercicios.findIndex(ex => ex.id === targetId);
  if (srcIdx === -1 || tgtIdx === -1) return;

  const moved = ejercicios.splice(srcIdx, 1)[0];
  ejercicios.splice(tgtIdx, 0, moved);

  // Assign new orden values
  ejercicios.forEach((ex, i) => { ex.orden = i + 1; });
  renderList();

  // PATCH all orden values to Supabase
  const status = document.getElementById('status-list');
  showStatus(status, 'loading', 'Guardando orden...');
  try {
    await Promise.all(ejercicios.map(ex =>
      fetch(`${SUPABASE_URL}/rest/v1/ejercicios?id=eq.${ex.id}`, {
        method: 'PATCH',
        headers,
        body: JSON.stringify({ orden: ex.orden })
      })
    ));
    showStatus(status, 'success', '✓ Orden guardado.');
    setTimeout(() => { status.style.display = 'none'; }, 2000);
  } catch(err) {
    showStatus(status, 'error', 'Error al guardar orden: ' + err.message);
  }
}

function abrirEdicion(id) {
  editingId = id;
  renderList();
  setTimeout(() => {
    const el = document.getElementById('edit-grupo-' + id);
    if (el) el.focus();
  }, 30);
}

function cancelarEdicion() {
  editingId = null;

}

async function guardarEdicion(id) {
  const grupo  = document.getElementById('edit-grupo-'  + id).value.trim();
  const nombre = document.getElementById('edit-nombre-' + id).value.trim();
  const series = parseInt(document.getElementById('edit-series-' + id).value) || 0;
  const reps   = parseInt(document.getElementById('edit-reps-'   + id).value) || 0;
  const carga  = parseFloat(document.getElementById('edit-carga-' + id).value) || 0;
  const tt     = document.getElementById('edit-tt-' + id).value.trim();
  const td     = document.getElementById('edit-td-' + id).value.trim();
  const status = document.getElementById('edit-status-' + id);

  if (!grupo || !nombre || !series) {
    showStatus(status, 'error', 'Completá grupo, ejercicio y series.');
    return;
  }

  showStatus(status, 'loading', 'Guardando...');

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/ejercicios?id=eq.${id}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify({ grupo_muscular: grupo, ejercicio: nombre, series, reps, carga, tiempo_trabajo: tt, tiempo_descanso: td })
    });
    if (!res.ok) throw new Error(await res.text());

    const idx = ejercicios.findIndex(e => e.id === id);
    if (idx !== -1) ejercicios[idx] = { ...ejercicios[idx], grupo_muscular: grupo, ejercicio: nombre, series, reps, carga, tiempo_trabajo: tt, tiempo_descanso: td };

    editingId = null;
    renderList();

    const statusList = document.getElementById('status-list');
    showStatus(statusList, 'success', `✓ ${nombre} actualizado.`);
    setTimeout(() => { statusList.style.display = 'none'; }, 2000);

  } catch(e) {
    showStatus(status, 'error', 'Error: ' + e.message);
  }
}

// ── CALENDAR POPOVER ─────────────────────────────────────────────────
let calViewDate = new Date(); // month being displayed

function toggleCalendar(e) {
  e.stopPropagation();
  const pop = document.getElementById('cal-popover');
  if (!pop) return;
  const isOpen = pop.classList.contains('open');
  if (isOpen) {
    pop.classList.remove('open');
    return;
  }
  // init view to current session date or today
  if (sesionData && sesionData.fecha) {
    calViewDate = new Date(sesionData.fecha + 'T12:00:00');
  } else {
    calViewDate = new Date();
  }
  renderCalendar();
  pop.classList.add('open');
}

function outsideCalendarClick(e) {
  const pop = document.getElementById('cal-popover');
  const badge = document.getElementById('badge-btn');
  if (pop && !pop.contains(e.target) && e.target !== badge && !badge?.contains(e.target)) {
    pop.classList.remove('open');
  }
}

function calNav(dir) {
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth() + dir, 1);
  renderCalendar();
}

function renderCalendar() {
  const grid   = document.getElementById('cal-grid');
  const label  = document.getElementById('cal-month-label');
  const foot   = document.getElementById('cal-foot');
  if (!grid || !label) return;

  const year  = calViewDate.getFullYear();
  const month = calViewDate.getMonth();
  const today = new Date(); today.setHours(0,0,0,0);

  // Selected date from sesionData
  let selectedDate = null;
  if (sesionData && sesionData.fecha) {
    selectedDate = new Date(sesionData.fecha + 'T12:00:00');
    selectedDate.setHours(0,0,0,0);
  }

  label.textContent = new Date(year, month, 1)
    .toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });

  // Day-of-week headers (Lu Ma Mi Ju Vi Sa Do)
  const dows = ['Lu','Ma','Mi','Ju','Vi','Sa','Do'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // First cell offset (Monday = 0)
  const firstDay = new Date(year, month, 1);
  let offset = firstDay.getDay() - 1; // getDay: 0=Sun
  if (offset < 0) offset = 6;

  // Fill blanks
  for (let i = 0; i < offset; i++) html += '<div></div>';

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const thisDate = new Date(year, month, d);
    thisDate.setHours(0,0,0,0);
    const isToday    = thisDate.getTime() === today.getTime();
    const isSelected = selectedDate && thisDate.getTime() === selectedDate.getTime();
    const cls = ['cal-day', isToday ? 'today' : '', isSelected ? 'selected' : ''].filter(Boolean).join(' ');
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += `<button class="${cls}" onclick="selectCalDate('${iso}')">${d}</button>`;
  }
  grid.innerHTML = html;

  // Footer: show how this date maps to sem/día given fecha_inicio
  if (alumnoData && alumnoData.fecha_inicio && selectedDate) {
    const { sem, dia } = calcSemDia(alumnoData.fecha_inicio, selectedDate);
    foot.innerHTML = `Fecha de inicio del programa: <b>${alumnoData.fecha_inicio}</b><br>
      Seleccionado → <b>Sem ${sem}, Día ${dia}</b>`;
  } else {
    foot.innerHTML = alumnoData && alumnoData.fecha_inicio
      ? `Fecha de inicio: <b>${alumnoData.fecha_inicio}</b>`
      : '<span style="color:#e05555">Sin fecha de inicio registrada en el alumno.</span>';
  }
}

function calcSemDia(fechaInicio, targetDate) {
  // fechaInicio: 'YYYY-MM-DD' string; targetDate: Date object (midnight)
  const start = new Date(fechaInicio + 'T00:00:00');
  start.setHours(0,0,0,0);
  const diffMs   = targetDate.getTime() - start.getTime();
  const diffDays = Math.floor(diffMs / 86400000); // total days since start (0-based)
  const dayIndex = diffDays < 0 ? 0 : diffDays;  // clamp to 0 if before start
  const sem = Math.floor(dayIndex / 7) + 1;
  const dia = (dayIndex % 7) + 1;
  return { sem, dia };
}

async function selectCalDate(isoDate) {
  const saving = document.getElementById('cal-saving');
  if (!saving) return;

  // Recalculate sem/día
  let sem = sesionData.semana;
  let dia = sesionData.dia;
  if (alumnoData && alumnoData.fecha_inicio) {
    const target = new Date(isoDate + 'T00:00:00');
    target.setHours(0,0,0,0);
    const calc = calcSemDia(alumnoData.fecha_inicio, target);
    sem = calc.sem;
    dia = calc.dia;
  }

  saving.textContent = 'Guardando...';

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/sesiones?id=eq.${sesionId}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify({ fecha: isoDate, semana: sem, dia: dia })
    });
    if (!res.ok) throw new Error(await res.text());

    // Update local state
    sesionData.fecha   = isoDate;
    sesionData.semana  = sem;
    sesionData.dia     = dia;

    saving.textContent = '✓ Guardado';
    setTimeout(() => {
      document.getElementById('cal-popover')?.classList.remove('open');
      renderInfoBar(); // re-render badge + meta with new values
    }, 700);

  } catch(e) {
    saving.textContent = 'Error: ' + e.message;
  }
}
